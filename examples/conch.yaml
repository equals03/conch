# Demonstrates conch v1 features: predicates, ordering, env (including raw tables),
# structured PATH, aliases, structured source, and shell-specific overrides.

blocks:
  core:
    path:
      prepend:
        - ~/.local/bin
      append:
        - /usr/local/sbin
      move_front:
        - ~/bin

  demoflags:
    env:
      ENABLE_CONCH_DEMO: true
      CONCH_DEMO_RETRIES: 3

  editor:
    after:
      - core
    env:
      EDITOR: nvim
      VISUAL: nvim

  shell-ident:
    after:
      - core
    shell:
      fish:
        env:
          SHELL:
            raw: "(command -v fish)"
      bash:
        env:
          SHELL:
            raw: "$(command -v bash)"

  convenience:
    when:
      - interactive
    after:
      - core
    alias:
      cd..: cd ..
      la: ls -la

  login-path:
    when:
      - login
    after:
      - core
    path:
      append:
        - /usr/local/bin

  nvim:
    when:
      - interactive
    requires:
      - command:nvim
    after:
      - editor
    alias:
      vim: nvim
    shell:
      fish:
        alias:
          v: nvim

  linux-tip:
    when:
      - interactive
      - os:linux
    after:
      - convenience
    env:
      CONCH_ON_LINUX: true

  bat:
    when:
      - interactive
    requires:
      - command:bat
    after:
      - core
    alias:
      cat: bat --style=plain --paging=never

  eza:
    when:
      - interactive
    requires:
      - command:eza
    after:
      - core
    alias:
      ls: eza --group-directories-first

  starship:
    when:
      - interactive
    requires:
      - command:starship
    after:
      - core
    source:
      - command:
          - starship
          - init
          - "{shell}"

  zoxide:
    when:
      - interactive
    requires:
      - command:zoxide
    after:
      - core
    source:
      - command:
          - zoxide
          - init
          - "{shell}"

  direnv:
    when:
      - interactive
    requires:
      - command:direnv
    after:
      - core
    source:
      - command:
          - direnv
          - hook
          - "{shell}"

  fzf:
    when:
      - interactive
    requires:
      - command:fzf
      - "!command:tv"
    after:
      - core
    source:
      - command:
          - fzf
          - "--{shell}"

  tv:
    when:
      - interactive
    requires:
      - command:tv
    after:
      - fzf
    source:
      - command:
          - tv
          - init
          - "{shell}"

  stow-hint:
    when:
      - interactive
    requires:
      - command:stow
      - dir:~/.local/share
    after:
      - core
    alias:
      dotfiles: stow --dir="$HOME/.local/share/dotfiles" --target="$HOME"
