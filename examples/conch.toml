# Demonstrates conch v1 features: predicates, ordering, env (including `{ raw = "..." }`),
# structured PATH, aliases, structured `source`, and shell-specific overrides.
# Predicates are shell-time guards; `conch check` does not evaluate them on the host.

[blocks.core]
# Unconditional: runs whenever the generated file is sourced.

[blocks.core.path]
prepend = ["~/.local/bin"]
append = ["/usr/local/sbin"]
move_front = ["~/bin"]

[blocks.demoflags.env]
# Non-string env scalars are supported (rendered per target shell).
ENABLE_CONCH_DEMO = true
CONCH_DEMO_RETRIES = 3

[blocks.editor]
after = ["core"]

[blocks.editor.env]
EDITOR = "nvim"
VISUAL = "nvim"

[blocks.shell-ident]
after = ["core"]

# Shell-specific tables can carry raw env fragments (no extra quoting from conch).
[blocks.shell-ident.shell.fish.env]
SHELL = { raw = "(command -v fish)" }

[blocks.shell-ident.shell.bash.env]
SHELL = { raw = "$(command -v bash)" }

[blocks.convenience]
when = ["interactive"]
after = ["core"]

[blocks.convenience.alias]
"cd.." = "cd .."
la = "ls -la"

[blocks.login-path]
when = ["login"]
after = ["core"]

[blocks.login-path.path]
append = ["/usr/local/bin"]

[blocks.nvim]
when = ["interactive"]
requires = ["command:nvim"]
after = ["editor"]

[blocks.nvim.alias]
vim = "nvim"

[blocks.nvim.shell.fish.alias]
v = "nvim"

[blocks.linux-tip]
when = ["interactive", "os:linux"]
after = ["convenience"]

[blocks.linux-tip.env]
CONCH_ON_LINUX = true

[blocks.bat]
when = ["interactive"]
requires = ["command:bat"]
after = ["core"]

[blocks.bat.alias]
cat = "bat --style=plain --paging=never"

[blocks.eza]
when = ["interactive"]
requires = ["command:eza"]
after = ["core"]

[blocks.eza.alias]
ls = "eza --group-directories-first"

[blocks.starship]
when = ["interactive"]
requires = ["command:starship"]
after = ["core"]
source = [{ command = ["starship", "init", "{shell}"] }]

[blocks.zoxide]
when = ["interactive"]
requires = ["command:zoxide"]
after = ["core"]
source = [{ command = ["zoxide", "init", "{shell}"] }]

[blocks.direnv]
when = ["interactive"]
requires = ["command:direnv"]
after = ["core"]
source = [{ command = ["direnv", "hook", "{shell}"] }]

# `fzf` and `tv` are common fuzzy-picker tools; this mirrors a typical mutual exclusion.
[blocks.fzf]
when = ["interactive"]
requires = ["command:fzf", "!command:tv"]
after = ["core"]
source = [{ command = ["fzf", "--{shell}"] }]

[blocks.tv]
when = ["interactive"]
requires = ["command:tv"]
after = ["fzf"]
source = [{ command = ["tv", "init", "{shell}"] }]

[blocks.stow-hint]
when = ["interactive"]
requires = ["command:stow", "dir:~/.local/share"]
after = ["core"]

[blocks.stow-hint.alias]
dotfiles = 'stow --dir="$HOME/.local/share/dotfiles" --target="$HOME"'
