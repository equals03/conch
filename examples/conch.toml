# Demonstrates conch v1 features: predicates, ordering, env (including `{ raw = "..." }`),
# structured PATH, aliases, and shell-specific overrides with `source_lines`.
# Predicates are shell-time guards; `conch check` does not evaluate them on the host.

[blocks.core]
# Unconditional: runs whenever the generated file is sourced.

[blocks.core.path]
prepend = ["~/.local/bin"]
append = ["/usr/local/sbin"]
move_front = ["~/bin"]

[blocks.demoflags.env]
# Non-string env scalars are supported (rendered per target shell).
ENABLE_CONCH_DEMO = true
CONCH_DEMO_RETRIES = 3

[blocks.editor]
after = ["core"]

[blocks.editor.env]
EDITOR = "nvim"
VISUAL = "nvim"

[blocks.shell-ident]
after = ["core"]

# Shell-specific tables can carry raw env fragments (no extra quoting from conch).
[blocks.shell-ident.shell.fish.env]
SHELL = { raw = "(command -v fish)" }

[blocks.shell-ident.shell.bash.env]
SHELL = { raw = "$(command -v bash)" }

[blocks.convenience]
when = ["interactive"]
after = ["core"]

[blocks.convenience.alias]
"cd.." = "cd .."
la = "ls -la"

[blocks.login-path]
when = ["login"]
after = ["core"]

[blocks.login-path.path]
append = ["/usr/local/bin"]

[blocks.nvim]
when = ["interactive"]
requires = ["command:nvim"]
after = ["editor"]

[blocks.nvim.alias]
vim = "nvim"

[blocks.nvim.shell.fish.alias]
v = "nvim"

[blocks.linux-tip]
when = ["interactive", "os:linux"]
after = ["convenience"]

[blocks.linux-tip.env]
CONCH_ON_LINUX = true

[blocks.bat]
when = ["interactive"]
requires = ["command:bat"]
after = ["core"]

[blocks.bat.alias]
cat = "bat --style=plain --paging=never"

[blocks.eza]
when = ["interactive"]
requires = ["command:eza"]
after = ["core"]

[blocks.eza.alias]
ls = "eza --group-directories-first"

[blocks.starship]
when = ["interactive"]
requires = ["command:starship"]
after = ["core"]

[blocks.starship.shell.fish]
source_lines = ["starship init fish | source"]

[blocks.starship.shell.bash]
source_lines = ['eval "$(starship init bash)"']

[blocks.zoxide]
when = ["interactive"]
requires = ["command:zoxide"]
after = ["core"]

[blocks.zoxide.shell.fish]
source_lines = ["zoxide init fish | source"]

[blocks.zoxide.shell.bash]
source_lines = ['eval "$(zoxide init bash)"']

[blocks.direnv]
when = ["interactive"]
requires = ["command:direnv"]
after = ["core"]

[blocks.direnv.shell.fish]
source_lines = ["direnv hook fish | source"]

[blocks.direnv.shell.bash]
source_lines = ['eval "$(direnv hook bash)"']

# `fzf` and `tv` are common fuzzy-picker tools; this mirrors a typical mutual exclusion.
[blocks.fzf]
when = ["interactive"]
requires = ["command:fzf", "!command:tv"]
after = ["core"]

[blocks.fzf.shell.fish]
source_lines = ["fzf --fish | source"]

[blocks.fzf.shell.bash]
source_lines = ['eval "$(fzf --bash)"']

[blocks.tv]
when = ["interactive"]
requires = ["command:tv"]
after = ["fzf"]

[blocks.tv.shell.fish]
source_lines = ["tv init fish | source"]

[blocks.tv.shell.bash]
source_lines = ['eval "$(tv init bash)"']

[blocks.stow-hint]
when = ["interactive"]
requires = ["command:stow", "dir:~/.local/share"]
after = ["core"]

[blocks.stow-hint.alias]
dotfiles = 'stow --dir="$HOME/.local/share/dotfiles" --target="$HOME"'
