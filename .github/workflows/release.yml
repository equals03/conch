name: release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VER="${GITHUB_REF_NAME#v}"
          if [[ -z "$TAG_VER" ]]; then
            echo "Invalid tag '${GITHUB_REF_NAME}' (expected v<semver>, not just 'v')."
            exit 1
          fi
          CRATE_VER=$(awk '
            /^\[package\]/ { p=1; next }
            /^\[/ { p=0 }
            p && /^version = "/ {
              if (match($0, /"[^"]*"/)) {
                print substr($0, RSTART+1, RLENGTH-2)
                exit
              }
            }
          ' Cargo.toml)
          if [[ -z "$CRATE_VER" ]]; then
            echo 'Could not read package version from [package] in Cargo.toml.'
            exit 1
          fi
          if [[ "$TAG_VER" != "$CRATE_VER" ]]; then
            echo "Tag version '${GITHUB_REF_NAME}' (expected crate version '$TAG_VER') does not match Cargo.toml version '$CRATE_VER'."
            exit 1
          fi

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/conch" dist/
          tar czf "conch-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz" -C dist conch
          echo "ARCHIVE=conch-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $archive = "conch-${env:GITHUB_REF_NAME}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/conch.exe" -DestinationPath $archive
          Add-Content -Path $env:GITHUB_ENV -Value "ARCHIVE=$archive"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: conch-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: "assets/*"
